<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puppy Calculator 🐶</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
    }

    h2 {
        margin-top: 20px;
    }

    .calculator {
        display: inline-block;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .display {
        width: 100%;
        height: 50px;
        margin-bottom: 10px;
        font-size: 24px;
        text-align: right;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        width: 60px;
        height: 40px;
        margin: 3px;
        font-size: 16px;
        cursor: pointer;
    }

    .wide {
        width: 126px;
    }
</style>
</head>

<body>

<h2>🐶 Puppy Calculator</h2>

<div class="calculator">
    <input type="text" id="display" class="display" value="0" readonly>

    <div>
        <button onclick="append('Math.sin(')">sin</button>
        <button onclick="append('Math.cos(')">cos</button>
        <button onclick="append('Math.tan(')">tan</button>
        <button onclick="append('Math.log10(')">log</button>
        <button onclick="append('Math.log(')">ln</button>
    </div>

    <div>
        <button onclick="append('Math.PI')">π</button>
        <button onclick="append('Math.E')">e</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="clearDisplay()">C</button>
    </div>

    <div>
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('/')">÷</button>
    </div>

    <div>
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('*')">×</button>
    </div>

    <div>
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('-')">−</button>
    </div>

    <div>
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="wide">=</button>
        <button onclick="append('+')">+</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        if (display.value === "0") {
            display.value = value;
        } else {
            display.value += value;
        }
    }

    function clearDisplay() {
        display.value = "0";
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
