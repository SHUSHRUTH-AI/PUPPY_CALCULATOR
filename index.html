<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Calculator</title>

<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
        flex-direction: column;
    }

    /* HEADER (PUPPY + NAME) */
    .header {
        text-align: center;
        margin-bottom: 20px;
    }

    .puppy {
        font-size: 3rem;
        animation: floatPuppy 2s ease-in-out infinite;
    }

    @keyframes floatPuppy {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    .name {
        font-size: 1.8rem;
        font-weight: bold;
        background: linear-gradient(90deg, #00c896, #00aaff, #ff9f43);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glowText 2s infinite alternate;
    }

    @keyframes glowText {
        from { text-shadow: 0 0 5px #00c896; }
        to { text-shadow: 0 0 20px #ff9f43; }
    }

    /* CALCULATOR */
    .calculator {
        background: #222;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        width: 320px;
        animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .display {
        background: #111;
        color: #fff;
        font-size: 2rem;
        padding: 15px;
        border-radius: 10px;
        text-align: right;
        margin-bottom: 15px;
        overflow-x: auto;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 18px;
        font-size: 1.2rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0,0,0,0.3);
    }

    button:active {
        transform: scale(0.95);
    }

    .number {
        background: #2d2d44;
        color: #fff;
    }

    .operator {
        background: #ff9f43;
        color: white;
    }

    .equal {
        background: #00c896;
        color: white;
        grid-column: span 2;
    }

    .clear {
        background: #ff4757;
        color: white;
    }
</style>
</head>

<body>

<!-- 👇 ADD HERE (PUPPY + NAME) -->
<div class="header">
    <div class="puppy">🐶</div>
    <h1 class="name">PUPPY MAN</h1>
</div>

<!-- CALCULATOR -->
<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" style="grid-column: span 2;" onclick="appendValue('0')">0</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function appendValue(value) {
        if (display.innerText === "0") {
            display.innerText = value;
        } else {
            display.innerText += value;
        }
    }

    function clearDisplay() {
        display.innerText = "0";
    }

    function calculate() {
        try {
            display.innerText = eval(display.innerText);
        } catch {
            display.innerText = "Error";
        }
    }
</script>

</body>
</html>
