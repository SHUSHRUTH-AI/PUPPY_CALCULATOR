<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    flex-direction: column;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 15px;
}

.puppy {
    font-size: 3rem;
    animation: floatPuppy 2s infinite ease-in-out;
}

@keyframes floatPuppy {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.name {
    font-size: 1.6rem;
    font-weight: bold;
    background: linear-gradient(90deg,#00c896,#00aaff,#ff9f43);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* CALCULATOR */
.calculator {
    background: #222;
    padding: 20px;
    border-radius: 20px;
    width: 360px;
}

.display {
    background: #111;
    color: #fff;
    font-size: 1.8rem;
    padding: 15px;
    border-radius: 10px;
    text-align: right;
    margin-bottom: 15px;
    overflow-x: auto;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
}

button {
    padding: 14px;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover { transform: scale(1.05); }

.number { background:#2d2d44; color:white; }
.operator { background:#ff9f43; color:white; }
.func { background:#4a69bd; color:white; }
.equal { background:#00c896; color:white; grid-column: span 2; }
.clear { background:#ff4757; color:white; }
</style>
</head>

<body>

<div class="header">
    <div class="puppy">🐶</div>
    <h1 class="name">PUPPY MAN</h1>
</div>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">

        <!-- FUNCTIONS -->
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="func" onclick="appendValue('(')">(</button>
        <button class="func" onclick="appendValue(')')">)</button>
        <button class="func" onclick="appendValue('Math.PI')">π</button>
        <button class="func" onclick="appendValue('Math.E')">e</button>

        <button class="func" onclick="appendValue('Math.sin(')">sin</button>
        <button class="func" onclick="appendValue('Math.cos(')">cos</button>
        <button class="func" onclick="appendValue('Math.tan(')">tan</button>
        <button class="func" onclick="appendValue('Math.log10(')">log</button>
        <button class="func" onclick="appendValue('Math.sqrt(')">√</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="func" onclick="appendValue('**2')">x²</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="func" onclick="appendValue('**')">xʸ</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('-')">−</button>
        <button class="func" onclick="appendValue('Math.log(')">ln</button>

        <button class="number" onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>
</div>

<script>
let display = document.getElementById("display");

function appendValue(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function calculate() {
    try {
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText = "Error";
    }
}
</script>

</body>
</html>
